services:
  db:
    image: postgres:14
    container_name: postgres_14_db_kursach
    restart: always
    env_file:
      - backend/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    restart: always
    volumes:
      - redis_data:/data

  celery:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A backend.src.tasks.celery_worker worker --loglevel=info
    depends_on:
      - db
      - redis
    restart: always
    env_file:
      - backend/.env

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    restart: always
    env_file:
      - backend/.env
    environment:
      - PYTHONPATH=/app
    command: python3 -m backend.main

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    stdin_open: true
    tty: true
    ports:
      - "3000:3000"
    command: npm start
    depends_on:
      - db
      - redis
      - backend
    restart: always

volumes:
  postgres_data:
  redis_data:

