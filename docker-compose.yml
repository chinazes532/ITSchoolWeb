services:
  db:
    image: postgres:14
    container_name: postgres_14_db_kursach
    restart: always
    env_file:
      - backend/.env
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DB_HOST: db
    ports:
      - "8000:8000"
    command: python3 backend/main.py
    depends_on:
      - db
    restart: always
    env_file:
      - backend/.env

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    stdin_open: true
    tty: true
    ports:
      - "3000:3000"
    command: npm start
    depends_on:
      - db
      - backend
    restart: always

volumes:
  postgres_data:

